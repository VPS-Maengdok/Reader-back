services:
  reader-back:
    image: maengdok-reader-back
    container_name: maengdok-reader-back
    restart: always
    build:
      context: .
      dockerfile: docker/Dockerfile
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
    stdin_open: true
    tty: true
    networks:
      - postgresql
    #  - reader-back
    env_file:
      - .env

networks:
  postgresql:
    external:
      true
  